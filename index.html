<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분리수거 가이드 - 서울시</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>분리수거 가이드</h1>
            <p class="subtitle">서울시 기준</p>
        </header>

        <main>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="품목 이름을 입력하세요 (예: 비닐, 충전선, 거울)"
                    autocomplete="off"
                >
                <button id="searchBtn">검색</button>
            </div>

            <div id="results" class="results">
                <p class="placeholder">품목을 검색하면 분리수거 방법을 알려드립니다</p>
            </div>
        </main>

        <footer>
            <p>서울시 분리수거 기준 정보 제공</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
