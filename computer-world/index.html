<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>컴퓨터 마을 견학 — 컴퓨터의 세계로</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0918; color: #e8e8f6; font-family: 'Segoe UI', system-ui, sans-serif; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
      canvas:active { cursor: grabbing; }

      #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 18px; z-index: 5; pointer-events: none; }
      #hud > * { pointer-events: auto; }
      .hud-title { font-size: 1.1em; font-weight: 700; text-shadow: 0 2px 14px rgba(0,0,0,.7); }
      .hud-title small { display: block; font-weight: 400; opacity: .7; font-size: .75em; margin-top: 4px; }
      .hud-right { display: flex; gap: 8px; align-items: center; }
      #progressChip { background: rgba(20,18,40,.7); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 8px 16px; font-size: .85em; backdrop-filter: blur(6px); white-space: nowrap; }
      #drawerToggle { background: rgba(20,18,40,.7); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: .9em; backdrop-filter: blur(6px); }
      #drawerToggle:hover { background: rgba(108,92,231,.4); }
      #relationshipBtn { background: rgba(20,18,40,.7); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: .9em; backdrop-filter: blur(6px); }
      #relationshipBtn:hover { background: rgba(108,92,231,.4); }

      #phaseProgress { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 6; pointer-events: none; }
      .phase-item { display: flex; align-items: center; gap: 6px; background: rgba(20,18,40,.8); border: 1px solid rgba(255,255,255,.15); border-radius: 20px; padding: 6px 12px; font-size: .75em; backdrop-filter: blur(6px); opacity: .5; transition: all .3s; }
      .phase-item.active { opacity: 1; border-color: #6c5ce7; background: rgba(108,92,231,.2); }
      .phase-item.done { opacity: .8; border-color: #00cec9; }
      .phase-item .num { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; font-weight: 700; }
      .phase-item.active .num { background: #6c5ce7; }
      .phase-item.done .num { background: #00cec9; }

      #drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(10,9,22,.95); backdrop-filter: blur(12px); border-left: 1px solid rgba(255,255,255,.1); transition: right .35s ease; z-index: 10; padding: 70px 14px 16px; overflow-y: auto; }
      #drawer.open { right: 0; }
      #drawer h4 { font-size: .85em; color: #a29bfe; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; padding-left: 6px; }
      .station-item { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: all .2s; border: 1px solid transparent; }
      .station-item:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.1); }
      .station-item .chk { width: 22px; text-align: center; font-size: 1em; opacity: .5; }
      .station-item.visited .chk { opacity: 1; }
      .station-item .si-icon { font-size: 1.4em; }
      .station-item .si-text { flex: 1; }
      .station-item .si-label { font-size: .9em; font-weight: 500; }
      .station-item .si-tag { font-size: .73em; opacity: .6; margin-top: 2px; }

      #intro { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: rgba(3,3,10,.9); backdrop-filter: blur(8px); transition: opacity .6s ease; }
      #intro.hide { opacity: 0; pointer-events: none; }
      .intro-card { max-width: 580px; text-align: center; padding: 44px 40px; background: rgba(14,12,28,.85); border: 1px solid rgba(255,255,255,.15); border-radius: 28px; }
      .intro-card h1 { font-size: 1.7em; background: linear-gradient(135deg, #a29bfe, #00cec9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 18px; line-height: 1.4; }
      .intro-card p { line-height: 1.9; color: #d0d0e8; font-size: .95em; margin-bottom: 12px; }
      .intro-card .subtitle { font-size: .88em; color: #9090b0; margin-bottom: 24px; }
      .intro-card button { margin-top: 16px; background: linear-gradient(135deg, #6c5ce7, #00cec9); border: none; color: #fff; padding: 15px 36px; border-radius: 14px; font-size: 1.05em; cursor: pointer; font-weight: 600; }
      .intro-card button:hover { filter: brightness(1.15); }
      .intro-map { display: flex; justify-content: center; gap: 10px; margin: 24px 0; flex-wrap: wrap; }
      .intro-map .map-step { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 10px 14px; font-size: .78em; text-align: center; }
      .intro-map .map-step .icon { font-size: 1.4em; margin-bottom: 4px; }
      .intro-map .map-step .num { font-size: .7em; color: #a29bfe; margin-bottom: 2px; }

      #caption { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); width: min(700px, 92vw); max-height: 62vh; overflow-y: auto; background: rgba(13,11,26,.95); border: 1px solid rgba(255,255,255,.15); border-radius: 20px; padding: 24px 26px; backdrop-filter: blur(16px); z-index: 8; box-shadow: 0 30px 80px rgba(0,0,0,.6); display: none; }
      #caption.show { display: block; animation: capIn .4s ease; }
      @keyframes capIn { from { opacity: 0; transform: translate(-50%, 24px); } to { opacity: 1; transform: translate(-50%, 0); } }

      #hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(20,18,40,.85); border: 1px solid rgba(255,255,255,.2); border-radius: 28px; padding: 10px 22px; font-size: .85em; backdrop-filter: blur(10px); z-index: 6; opacity: 0; transition: opacity .5s ease; pointer-events: none; text-align: center; }
      #hint.show { opacity: 1; }
      #finish { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); background: rgba(0,206,201,.2); border: 1px solid #00cec9; border-radius: 16px; padding: 12px 24px; font-size: .9em; z-index: 7; opacity: 0; transition: opacity .5s ease; pointer-events: none; text-align: center; }
      #finish.show { opacity: 1; }
      #charHint { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(20,18,40,.9); border: 1px solid rgba(255,255,255,.25); border-radius: 16px; padding: 12px 24px; font-size: .9em; backdrop-filter: blur(10px); z-index: 7; opacity: 0; transition: opacity .5s ease; pointer-events: none; text-align: center; max-width: 400px; }
      #charHint.show { opacity: 1; }

      #levelUnlock { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,9,22,.95); border: 2px solid #ffd93d; border-radius: 24px; padding: 40px 48px; font-size: 1em; z-index: 20; opacity: 0; transition: opacity .6s ease; pointer-events: none; text-align: center; backdrop-filter: blur(16px); box-shadow: 0 0 80px rgba(255,217,61,.3); }
      #levelUnlock.show { opacity: 1; pointer-events: auto; }
      #levelUnlock h2 { font-size: 1.5em; color: #ffd93d; margin-bottom: 12px; }
      #levelUnlock p { line-height: 1.8; color: #d0d0e8; margin-bottom: 8px; }
      #levelUnlock .level-badge { display: inline-block; padding: 6px 18px; border-radius: 12px; font-size: 1.1em; font-weight: 700; margin: 12px 0; }
      #levelUnlock .level-badge.inter { background: rgba(0,206,201,.2); border: 1px solid #00cec9; color: #00cec9; }
      #levelUnlock .level-badge.adv { background: rgba(255,107,107,.2); border: 1px solid #ff6b6b; color: #ff6b6b; }
      #levelUnlock button { margin-top: 16px; background: linear-gradient(135deg, #6c5ce7, #00cec9); border: none; color: #fff; padding: 14px 32px; border-radius: 12px; font-size: 1em; cursor: pointer; font-weight: 600; }
      #levelUnlock button:hover { filter: brightness(1.15); }

      #relationshipDiagram { position: fixed; inset: 0; z-index: 15; display: none; align-items: center; justify-content: center; background: rgba(3,3,10,.9); backdrop-filter: blur(6px); }
      #relationshipDiagram.show { display: flex; }
      .diagram-card { max-width: 800px; width: 90vw; text-align: center; padding: 32px; background: rgba(14,12,28,.95); border: 1px solid rgba(255,255,255,.15); border-radius: 20px; }
      .diagram-card h3 { font-size: 1.2em; margin-bottom: 20px; color: #a29bfe; }
      .diagram-card .diagram { position: relative; height: 300px; margin: 20px 0; }
      .diagram-card .close-btn { margin-top: 16px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: .9em; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 3px; }

      @media (max-width: 640px) {
        .hud-title { font-size: .95em; }
        #caption { width: 94vw; padding: 18px; }
        #phaseProgress { display: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud">
      <div class="hud-title">🏘️ 컴퓨터 마을 견학
        <small>건물 클릭: 설명 · 드래그: 이동 · 오른쪽 드래그: 회전 · 스크롤: 확대 · 더블클릭: 확대 이동</small>
      </div>
      <div class="hud-right">
        <div id="progressChip">0 / 11 방문</div>
        <button id="relationshipBtn">🔗 관계 보기</button>
        <button id="drawerToggle">☰ 장소 목록</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
