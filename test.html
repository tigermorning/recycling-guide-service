<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴퓨터는 사람 몸과 같다</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a14;color:#e8e8f0;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:50px 16px 20px}

h1{text-align:center;font-size:1.6em;margin:16px 0 4px;background:linear-gradient(90deg,#f0c27f,#fc5c7d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:#666;font-size:.88em;margin-bottom:24px}

/* 메뉴 */
#menu .lv{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:14px}
#menu .lv:hover{background:rgba(255,255,255,.07);transform:translateX(6px);border-color:rgba(255,255,255,.12)}
#menu .lv.lock{opacity:.3;pointer-events:none}
#menu .lv.done{border-color:#4ecdc4}
#menu .lv .em{font-size:1.8em;min-width:40px;text-align:center}
#menu .lv .ti{font-weight:700;font-size:.98em}
#menu .lv .ds{font-size:.78em;color:#888;margin-top:2px}

/* 게임 */
#game{display:none}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.top h2{font-size:1.05em}
.btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:.85em;color:#fff;background:rgba(255,255,255,.08);transition:.2s}
.btn:hover{background:rgba(255,255,255,.15)}
.btn.p{background:linear-gradient(90deg,#f0c27f,#fc5c7d)}
.pbar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:20px}
.pfill{height:100%;background:linear-gradient(90deg,#4ecdc4,#f0c27f);transition:width .4s}

/* 콘텐츠 */
.sec{margin-bottom:24px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.sec h3{color:#f0c27f;font-size:1.08em;margin-bottom:8px}
.sec p,.sec li{color:#bbb;line-height:1.8;font-size:.92em}
.sec ul{padding-left:18px}
.sec b{color:#fff}

/* 비주얼 영역 */
.vis{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:20px;margin-bottom:20px;text-align:center;min-height:80px;position:relative;overflow:hidden}

/* 인체 드로잉 (ASCII + CSS) */
.body-canvas{position:relative;width:200px;height:300px;margin:0 auto}
.organ{position:absolute;border-radius:50%;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;font-size:1.4em}
.organ:hover{transform:scale(1.15);filter:brightness(1.3)}
.organ.glow{animation:glow 1s ease infinite alternate}
@keyframes glow{from{box-shadow:0 0 8px rgba(78,205,196,.3)}to{box-shadow:0 0 24px rgba(78,205,196,.7)}}
.organ.active{box-shadow:0 0 30px rgba(240,194,127,.6);border:2px solid #f0c27f}
.organ .tip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;font-size:.72em;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s;color:#ddd}
.organ:hover .tip{opacity:1}

/* 매칭 게임 */
.match-game{display:flex;flex-direction:column;gap:10px;max-width:500px;margin:0 auto}
.match-row{display:flex;align-items:center;gap:8px}
.match-left{flex:1;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;padding:8px 12px;font-size:.85em;text-align:center}
.match-right{flex:1;padding:8px 12px;border-radius:6px;font-size:.85em;text-align:center;border:2px dashed rgba(255,255,255,.15);transition:.3s;min-height:38px}
.match-right.filled{border-style:solid;border-color:#4ecdc4;background:rgba(78,205,196,.1)}
.match-right.wrong{border-color:#fc5c7d;background:rgba(252,92,125,.1)}
.draggable{display:inline-block;padding:6px 14px;margin:4px;border-radius:6px;cursor:grab;transition:.2s;font-size:.85em;user-select:none}
.draggable:active{cursor:grabbing;transform:scale(1.05)}
.draggable.used{opacity:.3;pointer-events:none}

/* 터미널 시뮬 */
.term-box{background:#0d0d0d;border-radius:8px;padding:14px;font-family:Consolas,monospace;font-size:.85em;max-height:200px;overflow-y:auto;margin:10px 0;border:1px solid rgba(255,255,255,.05)}
.term-box .g{color:#4ecdc4}.term-box .w{color:#888}.term-box .r{color:#fc5c7d}.term-box .y{color:#f0c27f}
.term-input{display:flex;gap:6px;margin-top:8px}
.term-input input{flex:1;background:#0d0d0d;border:1px solid rgba(78,205,196,.3);border-radius:4px;padding:8px;color:#4ecdc4;font-family:Consolas,monospace;font-size:.9em;outline:none}
.term-input input:focus{border-color:#4ecdc4}
.term-input button{background:rgba(78,205,196,.2);border:1px solid rgba(78,205,196,.3);color:#4ecdc4;padding:8px 14px;border-radius:4px;cursor:pointer}
.term-input button:hover{background:rgba(78,205,196,.3)}

/* 웹 빌더 */
.web-builder{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.web-part{width:140px;min-height:160px;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:.4s;position:relative}
.web-part:hover{transform:translateY(-4px)}
.web-part.equipped{border-color:#4ecdc4!important;box-shadow:0 0 20px rgba(78,205,196,.3)}
.web-part .icon{font-size:2.2em;margin-bottom:6px}
.web-part .nm{font-weight:700;font-size:.9em}
.web-part .desc{font-size:.75em;color:#999;margin-top:4px}
.web-preview{background:#fff;border-radius:8px;padding:16px;min-height:120px;margin-top:16px;color:#333;font-size:.88em;text-align:left;transition:.5s}

/* 이벤트 루프 시각화 */
.loop-viz{position:relative;height:120px;margin:16px 0}
.loop-track{position:absolute;top:50%;left:10%;right:10%;height:4px;background:rgba(255,255,255,.08);border-radius:2px;transform:translateY(-50%)}
.loop-worker{position:absolute;width:28px;height:28px;border-radius:50%;background:#4ecdc4;display:flex;align-items:center;justify-content:center;font-size:.8em;top:50%;transform:translateY(-50%);transition:left .5s ease;z-index:2}
.loop-task{position:absolute;width:20px;height:20px;border-radius:50%;top:50%;transform:translateY(-50%);font-size:.65em;display:flex;align-items:center;justify-content:center;transition:left 1s ease,opacity .3s}
.loop-label{position:absolute;font-size:.7em;color:#888}

/* 네트워크 시각화 */
.net-viz{position:relative;height:180px;margin:16px 0}
.net-node{position:absolute;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8em;border:2px solid rgba(255,255,255,.1);transition:.3s;cursor:pointer}
.net-node:hover{transform:scale(1.1);border-color:#f0c27f}
.net-msg{position:absolute;width:10px;height:10px;border-radius:50%;background:#f0c27f;transition:all .8s ease;z-index:2}

/* 타임라인 */
.timeline{position:relative;padding-left:24px;margin:16px 0}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08)}
.tl-item{position:relative;margin-bottom:12px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid #4ecdc4;cursor:pointer;transition:.3s}
.tl-item:hover{background:rgba(255,255,255,.06)}
.tl-item::before{content:'';position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;background:#4ecdc4;border:2px solid #0a0a14}
.tl-item.branch-a{border-left-color:#f0c27f}.tl-item.branch-a::before{background:#f0c27f}
.tl-item.branch-b{border-left-color:#fc5c7d}.tl-item.branch-b::before{background:#fc5c7d}

/* 퀴즈 */
.quiz{background:rgba(240,194,127,.06);border:1px solid rgba(240,194,127,.2);border-radius:10px;padding:18px;margin-bottom:20px}
.quiz h4{color:#f0c27f;margin-bottom:10px;font-size:.95em}
.qbtn{display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:5px;color:#ccc;font-size:.88em;cursor:pointer;transition:.2s}
.qbtn:hover{border-color:#f0c27f;background:rgba(240,194,127,.08)}
.qbtn.ok{border-color:#4ecdc4;background:rgba(78,205,196,.12)}
.qbtn.no{border-color:#fc5c7d;background:rgba(252,92,125,.12)}
.qres{display:none;margin-top:8px;padding:8px 10px;border-radius:5px;font-size:.85em}
.qres.vis{display:block}
.qres.s{background:rgba(78,205,196,.1);color:#4ecdc4}
.qres.f{background:rgba(252,92,125,.1);color:#fc5c7d}

/* 점수 */
.score-bar{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(10,10,20,.95);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50;font-size:.82em}
.score-bar .streak{color:#f0c27f}
.score-bar .pts{color:#4ecdc4}

/* 모달 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center}
.modal.on{display:flex}
.mbox{background:#13131f;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:32px;max-width:400px;text-align:center}
.mbox h2{color:#4ecdc4;margin-bottom:12px}
.mbox p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.92em}
.mbox .btn{padding:10px 24px;font-size:.95em}

/* 파티클 */
.particle{position:fixed;pointer-events:none;z-index:200;font-size:1.2em;animation:particleFly 1s ease forwards}
@keyframes particleFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}

@media(max-width:600px){
    .web-builder{flex-direction:column;align-items:center}
    .web-part{width:100%;max-width:200px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="score-bar">
    <span class="streak" id="streak">🔥 0 연속</span>
    <span>컴퓨터 = 사람 몸</span>
    <span class="pts" id="pts">⭐ 0점</span>
</div>
<div class="wrap">
<h1>컴퓨터는 사람 몸과 같다</h1>
<p class="sub">클릭하고, 드래그하고, 직접 해보세요</p>
<div id="menu"></div>
<div id="game">
    <div class="top">
        <button class="btn" onclick="goM()">&#8592; 메뉴</button>
        <h2 id="gtit"></h2>
        <div style="display:flex;align-items:center;gap:6px">
            <span id="gprg" style="font-size:.82em;color:#666"></span>
            <button class="btn p" id="gnxt" onclick="nxt()">다음 &#8594;</button>
        </div>
    </div>
    <div class="pbar"><div class="pfill" id="pf" style="width:0"></div></div>
    <div id="gcont"></div>
</div>
</div>
<div class="modal" id="cmod"><div class="mbox"><h2>레벨 완료!</h2><p id="cmsg"></p><button class="btn p" onclick="clM()">계속하기</button></div></div>

<script>
/* ===== 백그라운드 파티클 ===== */
var cvs=document.getElementById('bg'),ctx=cvs.getContext('2d');
var pts=[];
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
window.addEventListener('resize',resizeCvs);resizeCvs();
function mkP(){pts.push({x:Math.random()*cvs.width,y:cvs.height+10,s:Math.random()*2+1,sp:Math.random()*.4+.1,a:Math.random()*.3+.05})}
function animP(){ctx.clearRect(0,0,cvs.width,cvs.height);
for(var i=pts.length-1;i>=0;i--){var p=pts[i];p.y-=p.sp;p.x+=Math.sin(p.y*.01)*.3;
ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle='rgba(78,205,196,'+p.a+')';ctx.fill();
if(p.y<-10)pts.splice(i,1)}
if(Math.random()<.15)mkP();requestAnimationFrame(animP)}
animP();

/* ===== 상태 ===== */
var cLv=0,cSt=0,cD=[],score=0,streak=0;
var M=[
{n:0,t:'소개',i:'컴퓨터 = 사람 몸',e:'🧠'},
{n:1,t:'뇌와 몸',i:'CPU, 코어, RAM, 저장장치',e:'🧠'},
{n:2,t:'신경계',i:'OS, 셸, 커널, 터미널',e:'⚡'},
{n:3,t:'배운 기술',i:'프로그램, 실행 환경',e:'🎓'},
{n:4,t:'골격과 근육',i:'HTML, CSS, JavaScript',e:'🦴'},
{n:5,t:'생각 패턴',i:'동기/비동기, 이벤트 루프',e:'💭'},
{n:6,t:'사회적 연결',i:'네트워크, API',e:'🤝'},
{n:7,t:'일기장',i:'Git, 커밋, 브랜치',e:'📔'},
{n:8,t:'스승과 제자',i:'AI, 바이브 코딩',e:'🤖'}
];

function rM(){
    var h='';
    for(var i=0;i<M.length;i++){
        var m=M[i],dn=cD.indexOf(m.n)>=0,lk=m.n>0&&cD.indexOf(m.n-1)<0&&!dn;
        h+='<div class="lv'+(dn?' done':'')+(lk?' lock':'')+'" onclick="'+(lk?'':'goL('+m.n+')')+'">';
        h+='<div class="em">'+m.e+'</div><div><div class="ti">Level '+m.n+': '+m.t+'</div><div class="ds">'+m.i+'</div></div></div>';
    }
    document.getElementById('menu').innerHTML=h;
}

function addScore(n,el){
    score+=n;streak++;
    document.getElementById('pts').textContent='⭐ '+score+'점';
    document.getElementById('streak').textContent='🔥 '+streak+' 연속';
    if(el){var r=document.createElement('span');r.className='particle';r.textContent='+'+n;
    r.style.left=el.getBoundingClientRect().left+'px';r.style.top=el.getBoundingClientRect().top+'px';
    document.body.appendChild(r);setTimeout(function(){r.remove()},1000)}
}
function breakStreak(){streak=0;document.getElementById('streak').textContent='🔥 0 연속'}

function qk(b,ok){
    var p=b.parentElement,bs=p.querySelectorAll('.qbtn');
    for(var i=0;i<bs.length;i++){bs[i].style.pointerEvents='none'}
    if(ok){b.classList.add('ok');addScore(10,b);var r=p.querySelector('.qres');if(r)r.className='qres vis s'}
    else{b.classList.add('no');breakStreak();var r=p.querySelector('.qres');if(r)r.className='qres vis f'}
}

var L={};

/* ===== Level 0: 소개 ===== */
L[0]={t:'소개',s:[
function(){return '<div class="sec"><h3>컴퓨터 = 사람 몸</h3>'+
'<p>이 게임에서는 컴퓨터를 <b>사람 몸</b>에 비유해요. 머리부터 발끝까지, 하나의 일관된 비유로 컴퓨터 전체를 이해해요.</p>'+
'<p style="margin-top:8px;color:#f0c27f">👇 아래 인체도를 <b>클릭</b>해서 각 장기가 어떤 컴퓨터 부품인지 확인해보세요!</p></div>'+

'<div class="vis"><div class="body-canvas" id="bodyMap">'+
'<div class="organ" style="top:5%;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(240,194,127,.2);border:2px solid #f0c27f" data-info="🧠 뇌 = CPU: 모든 생각과 계산을 담당"><span>🧠</span><span class="tip">뇌 = CPU</span></div>'+
'<div class="organ" style="top:25%;left:30%;width:36px;height:36px;background:rgba(78,205,196,.15);border:2px solid #4ecdc4" data-info="💬 언어 능력 = 셸: 생각을 말로 번역"><span>🗣️</span><span class="tip">언어 = 셸</span></div>'+
'<div class="organ" style="top:25%;right:30%;width:36px;height:36px;background:rgba(252,92,125,.15);border:2px solid #fc5c7d" data-info="👂 귀 = 터미널: 소리(정보)를 받음"><span>👂</span><span class="tip">귀 = 터미널</span></div>'+
'<div class="organ" style="top:38%;left:50%;transform:translateX(-50%);width:44px;height:44px;background:rgba(168,130,255,.15);border:2px solid #a882ff" data-info="🫀 심장/자율신경 = 커널: 의식하지 않는 핵심 관리"><span>🫀</span><span class="tip">자율신경 = 커널</span></div>'+
'<div class="organ" style="top:50%;left:25%;width:32px;height:32px;background:rgba(78,205,196,.12);border:2px solid rgba(78,205,196,.4)" data-info="🦴 골격 = HTML: 몸의 구조와 뼈대"><span>🦴</span><span class="tip">골격 = HTML</span></div>'+
'<div class="organ" style="top:50%;right:25%;width:32px;height:32px;background:rgba(240,194,127,.12);border:2px solid rgba(240,194,127,.4)" data-info="🎨 피부/옷 = CSS: 겉모습과 꾸밈"><span>🎨</span><span class="tip">피부 = CSS</span></div>'+
'<div class="organ" style="top:62%;left:50%;transform:translateX(-50%);width:38px;height:38px;background:rgba(252,92,125,.12);border:2px solid rgba(252,92,125,.4)" data-info="💪 근육 = JavaScript: 움직임과 반응"><span>💪</span><span class="tip">근육 = JS</span></div>'+
'<div class="organ" style="top:75%;left:50%;transform:translateX(-50%);width:34px;height:34px;background:rgba(240,194,127,.1);border:2px solid rgba(240,194,127,.3)" data-info="💭 단기 기억 = RAM: 지금 떠오르는 것"><span>💭</span><span class="tip">단기기억 = RAM</span></div>'+
'<div class="organ" style="top:88%;left:50%;transform:translateX(-50%);width:34px;height:34px;background:rgba(78,205,196,.1);border:2px solid rgba(78,205,196,.3)" data-info="🗄️ 장기 기억 = 저장장치: 오래 보관하는 것"><span>🗄️</span><span class="tip">장기기억 = 저장장치</span></div>'+
'</div>'+
'<div id="bodyInfo" style="margin-top:12px;padding:10px;background:rgba(240,194,127,.08);border-radius:6px;font-size:.88em;color:#f0c27f;min-height:36px;transition:.3s">위 장기를 클릭해보세요!</div></div>';
}]}

/* ===== Level 1: 뇌와 몸 ===== */
L[1]={t:'Level 1: 뇌와 몸',s:[
function(){return '<div class="sec"><h3>🧠 뇌 = CPU</h3><p>뇌는 몸에서 <b>모든 생각과 판단</b>을 담당해요. CPU도 마찬가지 — 컴퓨터 안에서 모든 계산을 해요.</p></div>'+

'<div class="vis"><div style="font-size:3em;margin-bottom:8px;cursor:pointer" onclick="pulseOrgan(this)" id="brainIcon">🧠</div>'+
'<p style="font-size:.85em;color:#999">위 아이콘을 클릭하면 뇌가 작동하는 애니메이션이 재생됩니다</p>'+
'<div id="brainAct" style="margin-top:8px;font-size:.85em;opacity:0;transition:.5s"></div></div>'+

'<div class="sec"><h3>🔀 코어 = 뇌 안의 영역</h3><p>뇌에는 언어 영역, 시각 영역, 운동 영역 등 <b>각자 다른 일을 하는 영역</b>이 있어요. CPU 안의 코어도 그래요.</p></div>'+

'<div class="vis"><div id="coreGame" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+
'<div class="core-box" style="background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.25);border-radius:8px;padding:10px 14px;text-align:center;cursor:pointer;transition:.3s" onclick="activateCore(this,0)"><div style="font-size:1.2em">🗣️</div><div style="font-size:.75em">언어</div></div>'+

// Level 2: 터미널
var tPath='C:\\Users\\user';
function rCmd(){
    var inp=document.getElementById('tinp'),box=document.getElementById('tbox'),c=inp.value.trim().toLowerCase();if(!c)return;
    var res='';
    if(c==='pwd')res='<div class="w">'+tPath+'</div>';
    else if(c==='ls')res='<div class="w">📁 photos/  📄 doc.txt  🎵 music.mp3</div>';
    else if(c==='whoami')res='<div class="g">👤 사용자</div>';
    else if(c==='help')res='<div class="w">pwd | ls | cd | mkdir | whoami | clear | help</div>';
    else if(c==='clear'){box.innerHTML='';inp.value='';return}
    else if(c==='mkdir')res='<div class="g">📁 새 폴더 생성!</div>';
    else res='<div class="r">"'+'" 모름. help 입력</div>'.replace('"',c);
    box.innerHTML+='<div class="g">$ '+inp.value+'</div>'+res;
    box.scrollTop=box.scrollHeight;inp.value='';addScore(2,box);
}

// Level 3: 도구 상자 매칭
function initToolGame(){
    var tools=[
        {q:'npm은?',a:'도구 상자 (라이브러리 설치)',id:'npm'},
        {q:'.env는?',a:'비밀 메모 (키 보관)',id:'env'},
        {q:'venv는?',a:'전용 작업실 (가상환경)',id:'venv'},
        {q:'nvm은?',a:'버전 관리자',id:'nvm'}
    ];
    var opts=['도구 상자 (라이브러리 설치)','비밀 메모 (키 보관)','전용 작업실 (가상환경)','버전 관리자'];
    var g=document.getElementById('toolGame');var html='';
    tools.forEach(function(t,i){
        html+='<div class="match-row"><div class="match-left">'+t.q+'</div>';
        html+='<div class="match-right" id="mr'+i+'" data-answer="'+t.a+'" onclick="checkToolMatch(this)"></div></div>';
    });
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px">';
    opts.forEach(function(o,i){html+='<div class="draggable" draggable="true" data-val="'+o+'" ondragstart="dragStart(event)" onclick="tapDrag(this)">'+o+'</div>'});
    html+='</div>';
    g.innerHTML=html;
}
var toolDone=0,selectedDrag=null;
function dragStart(e){e.dataTransfer.setData('text',e.target.dataset.val)}
function tapDrag(el){
    document.querySelectorAll('.draggable').forEach(function(d){d.style.outline=''});
    el.style.outline='2px solid #f0c27f';selectedDrag=el;
}
function checkToolMatch(el){
    if(!selectedDrag||el.classList.contains('filled'))return;
    var v=selectedDrag.dataset.val;
    if(v===el.dataset.answer){el.textContent=v;el.classList.add('filled');selectedDrag.classList.add('used');selectedDrag.style.outline='';selectedDrag=null;toolDone++;document.getElementById('toolStatus').textContent=toolDone+' / 4 완료';addScore(5,el)}
    else{el.classList.add('wrong');setTimeout(function(){el.classList.remove('wrong')},600);breakStreak()}
}

// Level 4: 웹 빌더
var equipped={};
function equipPart(el,type){

    el.classList.add('equipped');equipped[type]=true;
    var prev=document.getElementById('webPrev');
    var html='';
    if(equipped.html)html+='<div style="border:2px solid #4ecdc4;border-radius:8px;padding:8px;margin-bottom:6px"><b style="color:#4ecdc4">🦴 골격(HTML)</b> 적용됨 — 제목, 본문, 버튼의 구조가 생겼어요</div>';
    if(equipped.css)html+='<div style="border:2px solid #f0c27f;border-radius:8px;padding:8px;margin-bottom:6px;background:#f8f8ff"><b style="color:#f0c27f">🎨 피부(CSS)</b> 적용됨 — 색상, 간격, 글꼴이 적용됐어요</div>';
    if(equipped.js)html+='<div style="border:2px solid #fc5c7d;border-radius:8px;padding:8px;background:#fff5f5"><b style="color:#fc5c7d">💪 근육(JS)</b> 적용됨 — 버튼을 누르면 반응해요! <button onclick="alert(\'반응!\')" style="padding:4px 8px;border-radius:4px;border:1px solid #fc5c7d;background:#fc5c7d;color:#fff;cursor:pointer;margin-left:8px">눌러보세요</button></div>';
    if(equipped.html&&equipped.css&&equipped.js)html+='<div style="text-align:center;margin-top:8px;color:#4ecdc4;font-weight:700">🎉 골격+피부+근육 = 살아있는 사람(웹페이지) 완성!</div>';
    prev.innerHTML=html||'<span style="color:#aaa">위 세 가지를 클릭하면...</span>';
    addScore(5,el);
}

// Level 5: 동기/비동기 체험

// Level 5: 이벤트 루프
function runLoop(){

// Level 6: 네트워크 시각화
function sendMsg(from){
    var nodes=document.querySelectorAll('.net-node');
    var targets=[1,2,3,0,2];
    var t=targets[Math.floor(Math.random()*targets.length)];
    if(t===from)t=(t+1)%4;
    var n1=nodes[from].getBoundingClientRect(),n2=nodes[t].getBoundingClientRect();
    var svg=document.getElementById('netViz');
    var msg=document.createElement('div');msg.className='net-msg';
    msg.style.left=n1.left-svg.getBoundingClientRect().left+25+'px';
    msg.style.top=n1.top-svg.getBoundingClientRect().top+25+'px';
    svg.appendChild(msg);
    setTimeout(function(){
        msg.style.left=n2.left-svg.getBoundingClientRect().left+25+'px';
        msg.style.top=n2.top-svg.getBoundingClientRect().top+25+'px';
    },50);
    setTimeout(function(){msg.style.opacity='0';setTimeout(function(){msg.remove()},300);addScore(2,msg)},900);
}

// Level 7: 타임라인 커밋
var commitCount=0,hasBranch=false,branchMerged=false;
function addCommit(branch,color){
    commitCount++;
    var tl=document.getElementById('timeline');
    var cls=branch==='main'?'':' branch-a';
    tl.insertAdjacentHTML('beforeend','<div class="tl-item'+cls+'" style="border-left-color:'+color+'"><b>📸 커밋 #'+commitCount+'</b> — '+new Date().toLocaleTimeString()+'</div>');
    document.getElementById('tlStatus').textContent=commitCount+'개 커밋 완료!';
    addScore(3,tl.lastElementChild);
}
function addBranch(){
    if(hasBranch)return;hasBranch=true;
    addCommit('feature','#f0c27f');
    document.getElementById('tlStatus').innerHTML='<span style="color:#f0c27f">🔀 브랜치 생성! 독립적으로 개발 중...</span>';
}
function mergeBranch(){
    if(!hasBranch||branchMerged)return;branchMerged=true;
    var tl=document.getElementById('timeline');
    tl.insertAdjacentHTML('beforeend','<div class="tl-item" style="border-left-color:#a882ff"><b>↔ 병합!</b> main에 feature 합침</div>');
    document.getElementById('tlStatus').innerHTML='<span style="color:#a882ff">✅ 병합 완료!</span>';
    addScore(10,tl.lastElementChild);
}

// Level 8: AI 채팅
function askAI(){

// Level 8: 토큰 시각화
var tokenLevel=3;
function drainToken(){
    tokenLevel=Math.max(0,tokenLevel-1);
    var icons=['🔋','🔋','🪫','🪫','💀'];
    document.getElementById('tokenIcon').textContent=icons[tokenLevel]||'💀';
    if(tokenLevel<=1){document.getElementById('tokenIcon2').textContent='💸';addScore(1,document.getElementById('tokenIcon'))}
    if(tokenLevel===0){addScore(10,document.getElementById('tokenIcon'))}
}

document.getElementById('cmsg').textContent='Level '+cLv+' 완료!'+(nx?' → '+nx.t:'')+'\n⭐ '+score+'점';document.getElementById('cmod').className='modal on'}

rM();
